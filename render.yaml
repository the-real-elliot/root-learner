databases:
  - name: kali-academy-db
    plan: free
    databaseName: kali_academy

services:
  - type: web
    name: kali-academy
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:render
    startCommand: node artifacts/api-server/dist/index.js
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kali-academy-db
          property: connectionString
      - key: POSTGRES_SSL
        value: "no-verify"
